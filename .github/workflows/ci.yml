name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python:
    name: Lint and test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  cloudformation:
    name: Validate CloudFormation template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cfn-lint and cfn-nag
        run: |
          python -m pip install --upgrade pip
          pip install cfn-lint
          sudo gem install cfn-nag
      - name: cfn-lint
        run: cfn-lint infrastructure/template.yaml
      - name: cfn-nag
        run: cfn_nag_scan --input-path infrastructure/template.yaml
